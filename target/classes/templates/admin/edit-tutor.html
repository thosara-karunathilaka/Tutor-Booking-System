<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Tutor</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-container {
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<nav class="glass-nav">
    <a href="/" class="logo gradient-text">TutorBook</a>
    <div class="nav-links">
        <a th:href="@{/logout}" class="btn-glass">Logout</a>
    </div>
</nav>

<div class="page-container">
    <div class="glass-card">
        <h2 style="margin-bottom: 24px;"><span class="gradient-text">Edit Tutor</span></h2>
        <form th:action="@{/admin/tutor/edit}" th:object="${tutor}" method="post">
            <input type="hidden" th:field="*{userId}">
            <div style="margin-bottom: 20px;">
                <label class="form-label">Name</label>
                <input type="text" class="form-control-glass" th:field="*{name}" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">Username</label>
                <input type="text" class="form-control-glass" th:field="*{username}" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">Email</label>
                <input type="email" class="form-control-glass" th:field="*{email}" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">Password</label>
                <input type="text" class="form-control-glass" th:field="*{password}" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">Specialization</label>
                <input type="text" class="form-control-glass" th:field="*{specialization}">
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">Experience (Years)</label>
                <input type="number" class="form-control-glass" th:field="*{experienceYears}">
            </div>
            <div style="margin-bottom: 24px;">
                <label class="form-label">Hourly Rate ($)</label>
                <input type="number" step="0.01" class="form-control-glass" th:field="*{hourlyRate}">
            </div>
            <div style="display: flex; gap: 15px;">
                <button type="submit" class="btn-premium" style="flex: 1;">Update Tutor</button>
                <a th:href="@{/tutor/list}" class="btn-glass" style="flex: 1; text-align: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
