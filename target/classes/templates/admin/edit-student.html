<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Edit Student</h2>
    <form th:action="@{/admin/student/edit}" th:object="${student}" method="post">
        <input type="hidden" th:field="*{userId}">
        <div class="mb-3">
            <label>Name</label>
            <input type="text" class="form-control" th:field="*{name}" required>
        </div>
        <div class="mb-3">
            <label>Username</label>
            <input type="text" class="form-control" th:field="*{username}" required>
        </div>
        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" th:field="*{email}" required>
        </div>
        <div class="mb-3">
            <label>Password</label>
            <input type="text" class="form-control" th:field="*{password}" required>
        </div>
        <div class="mb-3">
            <label>Grade Level</label>
            <input type="text" class="form-control" th:field="*{gradeLevel}">
        </div>
        <div class="mb-3">
            <label>Address</label>
            <input type="text" class="form-control" th:field="*{address}">
        </div>
        <div class="mb-3">
            <label>Phone Number</label>
            <input type="text" class="form-control" th:field="*{phoneNumber}">
        </div>
        <button type="submit" class="btn btn-primary">Update Student</button>
        <a th:href="@{/student/list}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
