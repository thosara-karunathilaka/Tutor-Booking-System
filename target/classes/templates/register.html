<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Tutor Booking System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>
<body>

<nav class="glass-nav">
    <a href="/" class="logo gradient-text">TutorBook</a>
    <div class="nav-links">
        <a th:href="@{/login}" class="btn-glass">Login</a>
    </div>
</nav>

<div class="auth-container">
    <div class="glass-card auth-card">
        <h2 style="text-align: center; margin-bottom: 30px;">Create an Account</h2>
        <form th:action="@{/register}" th:object="${user}" method="post">
            <div style="margin-bottom: 20px;">
                <label class="form-label">Username</label>
                <input type="text" th:field="*{username}" class="form-control-glass" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">Full Name</label>
                <input type="text" th:field="*{name}" class="form-control-glass" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control-glass" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">Password</label>
                <input type="password" th:field="*{password}" class="form-control-glass" required>
            </div>
            <div style="margin-bottom: 24px;">
                <label class="form-label">Role</label>
                <select th:field="*{role}" class="form-control-glass" style="background-color: var(--bg-dark); cursor: pointer;">
                    <option value="STUDENT">Student</option>
                    <option value="TUTOR">Tutor</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn-premium" style="width: 100%;">Register</button>
        </form>
        <div style="margin-top: 24px; text-align: center;">
            <a th:href="@{/login}" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Already have an account? <span style="color: var(--accent-blue);">Login here</span></a>
        </div>
    </div>
</div>

</body>
</html>
