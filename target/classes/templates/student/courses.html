<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Browse Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Available Courses</h2>
        <a th:href="@{/dashboard/student}" class="btn btn-secondary">Back to Dashboard</a>
    </div>
    <div th:if="${param.enrolled}" class="alert alert-success alert-dismissible fade show">
        You have successfully enrolled in the course!
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div class="row">
        <div class="col-md-4 mb-3" th:each="course : ${courses}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${course.title}"></h5>
                    <p class="card-text text-muted" th:text="${course.description}"></p>
                    <p class="card-text"><strong>Price:</strong> $<span th:text="${course.price}"></span></p>
                </div>
                <div class="card-footer bg-white border-top-0">
                    <a th:href="@{'/student/enroll/' + ${course.courseId}}" class="btn btn-sm btn-primary w-100">Enroll Now</a>
                </div>
            </div>
        </div>
        <div class="col-12" th:if="${#lists.isEmpty(courses)}">
            <div class="alert alert-info">No courses are currently available. Check back later!</div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
