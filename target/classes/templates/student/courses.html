<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Browse Courses</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
<nav class="glass-nav">
    <a href="/" class="logo gradient-text">TutorBook</a>
    <div class="nav-links">
        <a th:href="@{/logout}" class="btn-glass">Logout</a>
    </div>
</nav>

<div class="page-container">
    <div class="header-actions">
        <h2><span class="gradient-text">Available Courses</span></h2>
        <a th:href="@{/dashboard/student}" class="btn-glass">Back to Dashboard</a>
    </div>
    
    <div th:if="${param.enrolled}" class="alert-success">
        You have successfully enrolled in the course!
    </div>
    
    <div class="courses-grid">
        <div class="glass-card" th:each="course : ${courses}" style="display: flex; flex-direction: column;">
            <h3 style="color: var(--accent-purple);" th:text="${course.title}"></h3>
            <p style="flex-grow: 1; margin: 15px 0;" th:text="${course.description}"></p>
            <p style="font-weight: 600; color: var(--text-main); margin-bottom: 20px;">Price: $<span th:text="${course.price}"></span></p>
            <a th:href="@{'/student/enroll/' + ${course.courseId}}" class="btn-premium" style="width: 100%;">Enroll Now</a>
        </div>
    </div>
    
    <div class="glass-card" th:if="${#lists.isEmpty(courses)}" style="text-align: center; padding: 40px;">
        <h3 style="color: var(--text-muted);">No courses are currently available. Check back later!</h3>
    </div>
</div>
</body>
</html>
