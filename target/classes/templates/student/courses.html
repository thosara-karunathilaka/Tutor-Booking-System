<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Browse Courses</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        /* Search bar styles */
        .search-wrapper {
            position: relative;
            margin-bottom: 30px;
        }
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none;
        }
        #courseSearch {
            width: 100%;
            padding: 14px 16px 14px 46px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            background: var(--bg-card);
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        #courseSearch:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-light);
        }
        #courseSearch::placeholder {
            color: var(--text-muted);
        }
        .no-results-msg {
            display: none;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
<nav class="glass-nav">
    <a href="/" class="logo gradient-text">TutorBook</a>
    <div class="nav-links">
        <a th:href="@{/logout}" class="btn-glass">Logout</a>
    </div>
</nav>

<div class="page-container">
    <div class="header-actions">
        <h2><span class="gradient-text">Available Courses</span></h2>
        <a th:href="@{/dashboard/student}" class="btn-glass">Back to Dashboard</a>
    </div>
    
    <div th:if="${param.enrolled}" class="alert-success">
        You have successfully enrolled in the course!
    </div>

    <!-- Search Bar -->
    <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="courseSearch" placeholder="Search by course title, instructor, or description..." autocomplete="off">
    </div>
    
    <div class="courses-grid" id="coursesGrid">
        <div class="glass-card course-card" th:each="course : ${courses}" style="display: flex; flex-direction: column;">
            <h3 class="course-title" style="color: var(--accent-purple);" th:text="${course.title}"></h3>
            <p class="course-instructor" style="font-size: 0.9em; color: var(--text-muted); margin-top: 5px;">Instructor: <span th:text="${course.tutorName}"></span></p>
            <p class="course-description" style="flex-grow: 1; margin: 15px 0;" th:text="${course.description}"></p>
            <p style="font-weight: 600; color: var(--text-main); margin-bottom: 12px;">Price: LKR <span th:text="${course.price}"></span></p>

            <!-- Schedule badges -->
            <div th:if="${course.availableDays != null and !course.availableDays.isEmpty()}"
                 style="margin-bottom: 16px;">
                <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px;">
                    <span th:each="day : ${course.availableDays}"
                          style="font-size: 0.78rem; padding: 3px 10px; border-radius: 20px;
                                 background: rgba(139,92,246,0.12); color: var(--accent-purple, #a78bfa);
                                 border: 1px solid rgba(139,92,246,0.25);"
                          th:text="${day.substring(0,3)}"></span>
                </div>
                <span th:if="${course.sessionTime != null and !course.sessionTime.isEmpty()}"
                      style="font-size: 0.8rem; padding: 3px 10px; border-radius: 20px;
                             background: rgba(139,92,246,0.12); color: var(--accent-purple, #a78bfa);
                             border: 1px solid rgba(139,92,246,0.25);">
                    🕐 <span th:text="${course.sessionTime}"></span>
                </span>
            </div>

            <a th:if="${session.role == 'STUDENT'}" th:href="@{'/student/enroll/' + ${course.courseId}}" class="btn-premium" style="width: 100%;">Enroll Now</a>
        </div>
    </div>

    <!-- No results message -->
    <div class="glass-card no-results-msg" id="noResultsMsg" style="text-align: center; padding: 40px;">
        <h3 style="color: var(--text-muted);">😕 No courses match your search. Try a different keyword!</h3>
    </div>
    
    <div class="glass-card" th:if="${#lists.isEmpty(courses)}" style="text-align: center; padding: 40px;">
        <h3 style="color: var(--text-muted);">No courses are currently available. Check back later!</h3>
    </div>
</div>

<script>
    document.getElementById('courseSearch').addEventListener('input', function () {
        const query = this.value.toLowerCase().trim();
        const cards = document.querySelectorAll('.course-card');
        let visibleCount = 0;

        cards.forEach(function (card) {
            const title = card.querySelector('.course-title')?.textContent.toLowerCase() || '';
            const instructor = card.querySelector('.course-instructor')?.textContent.toLowerCase() || '';
            const description = card.querySelector('.course-description')?.textContent.toLowerCase() || '';

            if (title.includes(query) || instructor.includes(query) || description.includes(query)) {
                card.style.display = 'flex';
                visibleCount++;
            } else {
                card.style.display = 'none';
            }
        });

        document.getElementById('noResultsMsg').style.display = visibleCount === 0 ? 'block' : 'none';
    });
</script>
</body>
</html>
