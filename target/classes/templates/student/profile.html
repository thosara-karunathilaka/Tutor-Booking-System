<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit My Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-container {
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<nav class="glass-nav">
    <a href="/" class="logo gradient-text">TutorBook</a>
    <div class="nav-links">
        <a th:href="@{/logout}" class="btn-glass">Logout</a>
    </div>
</nav>

<div class="page-container">
    <div class="glass-card">
        <h2 style="margin-bottom: 24px;"><span class="gradient-text">Edit My Profile</span></h2>
        <form th:action="@{/student/profile}" th:object="${student}" method="post">
            <div style="margin-bottom: 20px;">
                <label class="form-label">Name</label>
                <input type="text" class="form-control-glass" th:field="*{name}" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">Username</label>
                <input type="text" class="form-control-glass" th:field="*{username}" required readonly title="Username cannot be changed" style="opacity: 0.7; cursor: not-allowed;">
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">Email</label>
                <input type="email" class="form-control-glass" th:field="*{email}" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">Password</label>
                <input type="password" class="form-control-glass" th:field="*{password}" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">Grade Level</label>
                <input type="text" class="form-control-glass" th:field="*{gradeLevel}">
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">Address</label>
                <input type="text" class="form-control-glass" th:field="*{address}">
            </div>
            <div style="margin-bottom: 24px;">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-control-glass" th:field="*{phoneNumber}">
            </div>
            <div style="display: flex; gap: 15px;">
                <button type="submit" class="btn-premium" style="flex: 1;">Update Profile</button>
                <a th:href="@{/dashboard/student}" class="btn-glass" style="flex: 1; text-align: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
