<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Students List</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
<nav class="glass-nav">
    <a href="/" class="logo gradient-text">TutorBook</a>
    <div class="nav-links">
        <a th:href="@{/logout}" class="btn-glass">Logout</a>
    </div>
</nav>

<div class="page-container">
    <div class="header-actions">
        <h2><span class="gradient-text">Students Directory</span></h2>
        <div>
            <a th:href="@{/student/add}" class="btn-premium">Add Student</a>
            <a th:href="@{/dashboard/admin}" class="btn-glass" style="margin-left: 10px;">Back</a>
        </div>
    </div>
    
    <div class="glass-card" style="padding: 0; overflow-x: auto;">
        <table class="glass-table">
            <thead>
                <tr>
                    <th>User ID</th>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Grade Level</th>
                    <th>Address</th>
                    <th>Phone Number</th>
                    <th th:if="${session.role == 'ADMIN'}">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="student : ${students}">
                    <td th:text="${student.userId}"></td>
                    <td th:text="${student.name}"></td>
                    <td th:text="${student.username}"></td>
                    <td th:text="${student.email}"></td>
                    <td th:text="${student.gradeLevel}"></td>
                    <td th:text="${student.address}"></td>
                    <td th:text="${student.phoneNumber}"></td>
                    <td th:if="${session.role == 'ADMIN'}">
                        <a th:href="@{'/admin/student/edit/' + ${student.userId}}" style="color: #fbbf24; text-decoration: none; margin-right: 10px;">Edit</a>
                        <a th:href="@{'/admin/student/delete/' + ${student.userId}}" style="color: #ef4444; text-decoration: none;" onclick="return confirm('Are you sure?')">Delete</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(students)}">
                    <td colspan="8" style="text-align: center; padding: 30px;">No students found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
