<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Courses</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background 0.2s ease;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-edit {
            display: block;
            background: rgba(251,191,36,0.15);
            color: #fbbf24;
            border: 1px solid rgba(251,191,36,0.35);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
            text-decoration: none;
            width: 100%;
            margin-top: 10px;
            box-sizing: border-box;
            transition: background 0.2s ease, color 0.2s ease;
        }
        .btn-edit:hover {
            background: rgba(251,191,36,0.28);
            color: #f59e0b;
        }
    </style>
</head>
<body>
<nav class="glass-nav">
    <a href="/" class="logo gradient-text">TutorBook</a>
    <div class="nav-links">
        <a th:href="@{/logout}" class="btn-glass">Logout</a>
    </div>
</nav>

<div class="page-container">
    <div class="header-actions">
        <h2><span class="gradient-text">My Courses</span></h2>
        <div>
            <a th:href="@{/tutor/course/add}" class="btn-premium">Add Course</a>
            <a th:href="@{/dashboard/tutor}" class="btn-glass" style="margin-left: 10px;">Back</a>
        </div>
    </div>
    
    <div class="courses-grid">
        <div class="glass-card" th:each="course : ${courses}" style="display: flex; flex-direction: column;">
            <h3 style="color: var(--accent-blue);" th:text="${course.title}"></h3>
            <p style="font-size: 0.9em; color: var(--text-muted); margin-top: 5px;">Instructor: <span th:text="${course.tutorName}"></span></p>
            <p style="flex-grow: 1; margin: 15px 0;" th:text="${course.description}"></p>
            <p style="font-weight: 600; color: var(--text-main); margin-bottom: 10px;">Price: LKR <span th:text="${course.price}"></span></p>

            <!-- Schedule badges -->
            <div th:if="${course.availableDays != null and !course.availableDays.isEmpty()}"
                 style="margin-bottom: 16px;">
                <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px;">
                    <span th:each="day : ${course.availableDays}"
                          style="font-size: 0.78rem; padding: 3px 10px; border-radius: 20px;
                                 background: rgba(99,179,237,0.12); color: var(--accent-blue, #63b3ed);
                                 border: 1px solid rgba(99,179,237,0.25);"
                          th:text="${day.substring(0,3)}"></span>
                </div>
                <span th:if="${course.sessionTime != null and !course.sessionTime.isEmpty()}"
                      style="font-size: 0.8rem; padding: 3px 10px; border-radius: 20px;
                             background: rgba(99,179,237,0.12); color: var(--accent-blue, #63b3ed);
                             border: 1px solid rgba(99,179,237,0.25);">
                    🕐 <span th:text="${course.sessionTime}"></span>
                </span>
            </div>

            <a th:href="@{'/tutor/course/' + ${course.courseId} + '/students'}" class="btn-premium" style="width: 100%;">Enrolled Students</a>
            <a th:href="@{'/tutor/course/' + ${course.courseId} + '/edit'}" class="btn-edit">✏️ Edit Course</a>
            <form th:action="@{'/tutor/course/' + ${course.courseId} + '/delete'}" method="post"
                  onsubmit="return confirm('Are you sure you want to delete this course? This cannot be undone.')">
                <button type="submit" class="btn-danger">🗑 Delete Course</button>
            </form>
        </div>
    </div>
    
    <div class="glass-card" th:if="${#lists.isEmpty(courses)}" style="text-align: center; padding: 40px;">
        <h3 style="color: var(--text-muted);">You haven't uploaded any courses yet.</h3>
    </div>
</div>
</body>
</html>
