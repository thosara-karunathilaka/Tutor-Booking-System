<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Edit My Profile</h2>
    <form th:action="@{/tutor/profile}" th:object="${tutor}" method="post">
        <div class="mb-3">
            <label>Name</label>
            <input type="text" class="form-control" th:field="*{name}" required>
        </div>
        <div class="mb-3">
            <label>Username</label>
            <input type="text" class="form-control" th:field="*{username}" required readonly title="Username cannot be changed">
        </div>
        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" th:field="*{email}" required>
        </div>
        <div class="mb-3">
            <label>Password</label>
            <input type="password" class="form-control" th:field="*{password}" required>
        </div>
        <div class="mb-3">
            <label>Specialization</label>
            <input type="text" class="form-control" th:field="*{specialization}">
        </div>
        <div class="mb-3">
            <label>Experience (Years)</label>
            <input type="number" class="form-control" th:field="*{experienceYears}">
        </div>
        <div class="mb-3">
            <label>Hourly Rate ($)</label>
            <input type="number" step="0.01" class="form-control" th:field="*{hourlyRate}">
        </div>
        <button type="submit" class="btn btn-primary">Update Profile</button>
        <a th:href="@{/dashboard/tutor}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
