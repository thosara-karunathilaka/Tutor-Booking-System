<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Enrolled Students</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-container {
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
<nav class="glass-nav">
    <a href="/" class="logo gradient-text">TutorBook</a>
    <div class="nav-links">
        <a th:href="@{/logout}" class="btn-glass">Logout</a>
    </div>
</nav>

<div class="page-container">
    <div class="header-actions">
        <h2><span class="gradient-text">Enrolled Students</span></h2>
        <a th:href="@{/tutor/courses}" class="btn-glass">Back to My Courses</a>
    </div>
    
    <div class="glass-card" style="padding: 0; overflow-x: auto;">
        <table class="glass-table">
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Email</th>
                    <th>Phone Number</th>
                    <th>Grade Level</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="student : ${students}">
                    <td th:text="${student.name}"></td>
                    <td th:text="${student.email}"></td>
                    <td th:text="${student.phoneNumber}"></td>
                    <td th:text="${student.gradeLevel}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(students)}">
                    <td colspan="4" style="text-align: center; padding: 30px;">No students have enrolled in this course yet.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
