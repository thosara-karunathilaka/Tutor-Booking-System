<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Course</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-container {
            padding: 40px;
            max-width: 640px;
            margin: 0 auto;
        }
        .schedule-section {
            border: 1px solid rgba(99, 179, 237, 0.25);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            background: rgba(99, 179, 237, 0.04);
        }
        .schedule-section-title {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent-blue, #63b3ed);
            margin-bottom: 16px;
        }
        .days-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .day-checkbox { display: none; }
        .day-label {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(99, 179, 237, 0.35);
            color: var(--text-muted, #a0aec0);
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .day-checkbox:checked + .day-label {
            background: rgba(99, 179, 237, 0.22);
            border-color: var(--accent-blue, #63b3ed);
            color: var(--accent-blue, #63b3ed);
        }
        input[type="time"] { color-scheme: dark; }
        .badge-edit {
            display: inline-block;
            background: rgba(251,191,36,0.15);
            color: #fbbf24;
            border: 1px solid rgba(251,191,36,0.3);
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            padding: 3px 12px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-left: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
<nav class="glass-nav">
    <a href="/" class="logo gradient-text">TutorBook</a>
    <div class="nav-links">
        <a th:href="@{/tutor/courses}" class="btn-glass">My Courses</a>
        <a th:href="@{/logout}" class="btn-glass">Logout</a>
    </div>
</nav>

<div class="page-container">
    <div class="glass-card">
        <h2 style="margin-bottom: 24px;">
            <span class="gradient-text">Edit Course</span>
            <span class="badge-edit">Editing</span>
        </h2>

        <form th:action="@{'/tutor/course/' + ${course.courseId} + '/edit'}"
              th:object="${course}" method="post">

            <!-- Basic Info -->
            <div style="margin-bottom: 20px;">
                <label class="form-label">Title</label>
                <input type="text" class="form-control-glass" th:field="*{title}"
                       placeholder="e.g. Introduction to Algebra" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">Description</label>
                <textarea class="form-control-glass" th:field="*{description}"
                          rows="4" placeholder="Describe what students will learn..." required></textarea>
            </div>
            <div style="margin-bottom: 24px;">
                <label class="form-label">Price ($)</label>
                <input type="number" step="0.01" min="0" class="form-control-glass"
                       th:field="*{price}" placeholder="0.00" required>
            </div>

            <!-- Schedule Section -->
            <div class="schedule-section">
                <p class="schedule-section-title">📅 Schedule &amp; Availability</p>

                <!-- Available Days -->
                <label class="form-label" style="margin-bottom: 10px; display: block;">Available Days in Week</label>
                <div class="days-grid">
                    <th:block th:each="day : ${ {'Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'} }">
                        <input class="day-checkbox" type="checkbox"
                               th:id="${'day-' + day}"
                               th:name="availableDays"
                               th:value="${day}"
                               th:checked="${course.availableDays != null and course.availableDays.contains(day)}">
                        <label class="day-label" th:for="${'day-' + day}" th:text="${day.substring(0,3)}"></label>
                    </th:block>
                </div>

                <!-- Session Time -->
                <div>
                    <label class="form-label">Session Time</label>
                    <input type="time" class="form-control-glass" th:field="*{sessionTime}"
                           id="sessionTime">
                    <small style="color: var(--text-muted, #a0aec0); display: block; margin-top: 6px; font-size: 0.8rem;">
                        Daily session start time for this course
                    </small>
                </div>
            </div>

            <!-- Actions -->
            <div style="display: flex; gap: 15px;">
                <button type="submit" class="btn-premium" style="flex: 1;">💾 Save Changes</button>
                <a th:href="@{/tutor/courses}" class="btn-glass" style="flex: 1; text-align: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
