<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Course</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-container {
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<nav class="glass-nav">
    <a href="/" class="logo gradient-text">TutorBook</a>
    <div class="nav-links">
        <a th:href="@{/logout}" class="btn-glass">Logout</a>
    </div>
</nav>

<div class="page-container">
    <div class="glass-card">
        <h2 style="margin-bottom: 24px;"><span class="gradient-text">Add New Course</span></h2>
        <form th:action="@{/tutor/course/add}" th:object="${course}" method="post">
            <div style="margin-bottom: 20px;">
                <label class="form-label">Title</label>
                <input type="text" class="form-control-glass" th:field="*{title}" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label class="form-label">Description</label>
                <textarea class="form-control-glass" th:field="*{description}" rows="4" required></textarea>
            </div>
            <div style="margin-bottom: 24px;">
                <label class="form-label">Price ($)</label>
                <input type="number" step="0.01" class="form-control-glass" th:field="*{price}" required>
            </div>
            <div style="display: flex; gap: 15px;">
                <button type="submit" class="btn-premium" style="flex: 1;">Save Course</button>
                <a th:href="@{/tutor/courses}" class="btn-glass" style="flex: 1; text-align: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
