<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>My Courses</h2>
        <div>
            <a th:href="@{/tutor/course/add}" class="btn btn-success">Add Course</a>
            <a th:href="@{/dashboard/tutor}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>
    <div class="row">
        <div class="col-md-4 mb-3" th:each="course : ${courses}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${course.title}"></h5>
                    <p class="card-text text-muted" th:text="${course.description}"></p>
                    <p class="card-text"><strong>Price:</strong> $<span th:text="${course.price}"></span></p>
                </div>
                <div class="card-footer bg-white border-top-0">
                    <a th:href="@{'/tutor/course/' + ${course.courseId} + '/students'}" class="btn btn-sm btn-info text-white">View Enrolled Students</a>
                </div>
            </div>
        </div>
        <div class="col-12" th:if="${#lists.isEmpty(courses)}">
            <div class="alert alert-info">You haven't uploaded any courses yet.</div>
        </div>
    </div>
</div>
</body>
</html>
