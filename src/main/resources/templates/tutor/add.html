<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Tutor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2>Add New Tutor</h2>
                <a th:href="@{/tutor/list}" class="btn btn-secondary">Back to List</a>
            </div>
            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="@{/tutor/add}" th:object="${tutor}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" th:field="*{username}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" th:field="*{password}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Specialization</label>
                            <input type="text" th:field="*{specialization}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Experience (Years)</label>
                            <input type="number" th:field="*{experienceYears}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Hourly Rate ($)</label>
                            <input type="number" step="0.01" th:field="*{hourlyRate}" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Tutor</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
