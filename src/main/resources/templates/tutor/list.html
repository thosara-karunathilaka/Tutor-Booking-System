<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tutors List</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .page-container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
<nav class="glass-nav">
    <a href="/" class="logo gradient-text">TutorBook</a>
    <div class="nav-links">
        <a th:href="@{/logout}" class="btn-glass">Logout</a>
    </div>
</nav>

<div class="page-container">
    <div class="header-actions">
        <h2><span class="gradient-text">Tutors Directory</span></h2>
        <div>
            <a th:if="${userRole == 'ADMIN'}" th:href="@{/tutor/add}" class="btn-premium">Add Tutor</a>
            <a th:if="${userRole == 'ADMIN'}" th:href="@{/dashboard/admin}" class="btn-glass" style="margin-left: 10px;">Back</a>
            <a th:if="${userRole == 'STUDENT'}" th:href="@{/dashboard/student}" class="btn-glass" style="margin-left: 10px;">Back</a>
            <a th:if="${userRole == 'TUTOR'}" th:href="@{/dashboard/tutor}" class="btn-glass" style="margin-left: 10px;">Back</a>
        </div>
    </div>
    
    <div class="glass-card" style="padding: 0; overflow-x: auto;">
        <table class="glass-table">
            <thead>
                <tr>
                    <th>User ID</th>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Specialization</th>
                    <th>Experience (Yrs)</th>
                    <th>Hourly Rate ($)</th>
                    <th th:if="${userRole == 'ADMIN' or userRole == 'STUDENT'}">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="tutor : ${tutors}">
                    <td th:text="${tutor.userId}"></td>
                    <td th:text="${tutor.name}"></td>
                    <td th:text="${tutor.username}"></td>
                    <td th:text="${tutor.email}"></td>
                    <td th:text="${tutor.specialization}"></td>
                    <td th:text="${tutor.experienceYears}"></td>
                    <td th:text="${tutor.hourlyRate}"></td>
                    <td th:if="${userRole == 'ADMIN'}">
                        <a th:href="@{'/admin/tutor/' + ${tutor.userId} + '/courses'}" style="color: #60a5fa; text-decoration: none; margin-right: 10px;">View Courses</a>
                        <a th:href="@{'/admin/tutor/edit/' + ${tutor.userId}}" style="color: #fbbf24; text-decoration: none; margin-right: 10px;">Edit</a>
                        <a th:href="@{'/admin/tutor/delete/' + ${tutor.userId}}" style="color: #ef4444; text-decoration: none;" onclick="return confirm('Are you sure?')">Delete</a>
                    </td>
                    <td th:if="${userRole == 'STUDENT'}">
                        <a th:href="@{'/student/tutor/' + ${tutor.userId} + '/courses'}" class="btn-premium" style="padding: 5px 10px; font-size: 0.9em;">View Courses</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(tutors)}">
                    <td colspan="8" style="text-align: center; padding: 30px;">No tutors found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
