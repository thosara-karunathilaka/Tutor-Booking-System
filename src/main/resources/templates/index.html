<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Booking System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navbar -->
<nav class="glass-nav">
    <a href="/" class="logo gradient-text">TutorBook</a>
    <div class="nav-links">
        <a th:href="@{/login}" class="btn-glass">Login</a>
        <a th:href="@{/register}" class="btn-premium">Sign Up</a>
    </div>
</nav>

<!-- Hero Section -->
<section style="min-height: 85vh; display: flex; justify-content: center; align-items: center; text-align: center; padding: 20px;">
    <div class="glass-card" style="max-width: 800px; padding: 60px;">
        <h1 style="font-size: 3.5rem; margin-bottom: 24px;">Find the <span class="gradient-text">Best Tutors</span> Online</h1>
        <p style="font-size: 1.2rem; margin-bottom: 40px; color: var(--text-muted);">
            Book professional tutors easily, master new subjects, and elevate your learning experience with our state-of-the-art platform.
        </p>
        <a th:href="@{/register}" class="btn-premium" style="font-size: 1.1rem; padding: 16px 32px;">Start Learning Today</a>
    </div>
</section>

</body>
</html>
