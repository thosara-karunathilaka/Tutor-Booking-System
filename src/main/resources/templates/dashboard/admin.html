<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .dashboard-container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<nav class="glass-nav">
    <a href="#" class="logo gradient-text">TBS Admin</a>
    <div class="nav-links">
        <a th:href="@{/logout}" class="btn-glass">Logout</a>
    </div>
</nav>

<div class="dashboard-container">
    <h2>Welcome, <span class="gradient-text">Admin!</span></h2>
    
    <div class="dashboard-grid">
        <div class="glass-card">
            <h3 style="color: var(--accent-blue);">Manage Tutors</h3>
            <p>View and manage tutors in the system.</p>
            <div style="margin-top: 20px;">
                <a th:href="@{/tutor/list}" class="btn-premium">Go to Tutors</a>
            </div>
        </div>
        
        <div class="glass-card">
            <h3 style="color: var(--accent-purple);">Manage Students</h3>
            <p>View and manage students in the system.</p>
            <div style="margin-top: 20px;">
                <a th:href="@{/student/list}" class="btn-premium">Go to Students</a>
            </div>
        </div>
        
        <div class="glass-card">
            <h3 style="color: var(--text-main);">My Profile</h3>
            <p>Update your administrative profile details.</p>
            <div style="margin-top: 20px;">
                <a th:href="@{/admin/profile}" class="btn-glass">Edit Profile</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
