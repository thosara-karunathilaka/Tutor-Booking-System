<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">TBS Admin Dashboard</a>
        <a class="btn btn-outline-light" th:href="@{/logout}">Logout</a>
    </div>
</nav>
<div class="container mt-4">
    <h2>Welcome, Admin!</h2>
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Manage Tutors</h5>
                    <p class="card-text">View and manage tutors in the system.</p>
                    <a th:href="@{/tutor/list}" class="btn btn-primary">Go to Tutors</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Manage Students</h5>
                    <p class="card-text">View and manage students in the system.</p>
                    <a th:href="@{/student/list}" class="btn btn-success">Go to Students</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">My Profile</h5>
                    <p class="card-text">Update your administrative profile details.</p>
                    <a th:href="@{/admin/profile}" class="btn btn-info text-white">Edit Profile</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
